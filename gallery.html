<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>La Pasta Bella - Gallery</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Cinzel', serif;
      background: linear-gradient(to right, #fff8f0, #fce4d6);
      color: #333;
    }
    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 3em;
      color: #8B0000;
      margin: 30px 0;
      text-align: center;
    }
    .gallery-img {
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      border-radius: 8px;
    }
    .gallery-img:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    footer {
      background-color: #8B0000;
      color: white;
      padding: 15px;
      text-align: center;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">La Pasta Bella</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
          <li class="nav-item"><a class="nav-link active" href="gallery.html">Gallery</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Gallery Title -->
  <h1>Our Gallery</h1>

  <!-- Gallery Grid -->
  <div class="container">
    <div class="row g-4">
      <div class="col-md-4"><img src="images/pasta.jpg" class="img-fluid gallery-img" alt="Pasta" data-bs-toggle="modal" data-bs-target="#lightboxModal"></div>
      <div class="col-md-4"><img src="images/pizza.jpg" class="img-fluid gallery-img" alt="Pizza" data-bs-toggle="modal" data-bs-target="#lightboxModal"></div>
      <div class="col-md-4"><img src="images/wine.jpg" class="img-fluid gallery-img" alt="Wine" data-bs-toggle="modal" data-bs-target="#lightboxModal"></div>
      <div class="col-md-4"><img src="images/dessert.jpg" class="img-fluid gallery-img" alt="Dessert" data-bs-toggle="modal" data-bs-target="#lightboxModal"></div>
      <div class="col-md-4"><img src="images/interior.jpg" class="img-fluid gallery-img" alt="Interior" data-bs-toggle="modal" data-bs-target="#lightboxModal"></div>
      <div class="col-md-4"><img src="images/chef.jpg" class="img-fluid gallery-img" alt="Chef" data-bs-toggle="modal" data-bs-target="#lightboxModal"></div>
      <div class="col-md-4"><img src="images/customers.jpg" class="img-fluid gallery-img" alt="Happy Customers" data-bs-toggle="modal" data-bs-target="#lightboxModal"></div>
      <div class="col-md-4"><img src="images/drinks.jpg" class="img-fluid gallery-img" alt="Drinks" data-bs-toggle="modal" data-bs-target="#lightboxModal"></div>
      <div class="col-md-4"><img src="images/outdoor.jpg" class="img-fluid gallery-img" alt="Outdoor Dining" data-bs-toggle="modal" data-bs-target="#lightboxModal"></div>
    </div>
  </div>

  <!-- Lightbox Modal -->
  <div class="modal fade" id="lightboxModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content bg-dark">
        <div class="modal-body text-center">
          <img id="lightboxImage" src="" class="img-fluid rounded" alt="Gallery Image">
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 La Pasta Bella • Crafted with Love</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script>
    // Lightbox functionality
    const galleryImages = document.querySelectorAll('.gallery-img');
    const lightboxImage = document.getElementById('lightboxImage');

    galleryImages.forEach(img => {
      img.addEventListener('click', () => {
        lightboxImage.src = img.src;
        lightboxImage.alt = img.alt;
      });
    });
  </script>
</body>
</html>
