<html>
<head>

  <title>Pizza Menu - La Pasta Bella</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Cinzel', serif;
      background: #fff8f0;
    }
    header {
      text-align: center;
      padding: 20px;
    }
    header h1 {
      color: #8B0000;
      font-size: 3em;
    }
    .card {
      transition: transform 0.3s ease;
    }
    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    .btn-order {
      background: #8B0000;
      color: #fff;
    }
    .btn-order:hover {
      background: #a52a2a;
    }
    .discount {
      position: absolute;
      top: 10px;
      right: 10px;
      background: gold;
      color: black;
      padding: 5px 10px;
      border-radius: 5px;
      font-weight: bold;
    }
    footer {
      background: #8B0000;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Pizza Selection</h1>
    <p>Wood-fired perfection with customizable flavours</p>
    <hr>
  </header>

  <div class="container mt-4">
    <div class="row g-4">
      
      <div class="col-md-4">
        <div class="card position-relative">
          <span class="discount">₹250 Only</span>
          <img src="margherita.png" class="card-img-top" alt="Margherita Pizza">
          <div class="card-body text-center">
            <h5 class="card-title">Margherita</h5>
            <p class="card-text">Classic cheese & tomato<br>Price: ₹300</p>
            <button class="btn btn-order" onclick="addToCart('Margherita Pizza - ₹300')">Add to Cart</button>
          </div>
        </div>
      </div>
  
      <div class="col-md-4">
        <div class="card position-relative">
          <img src="pepperoni.png" class="card-img-top" alt="Pepperoni Pizza">
          <div class="card-body text-center">
            <h5 class="card-title">Pepperoni</h5>
            <p class="card-text">Spicy pepperoni slices<br>Price: ₹450</p>
            <button class="btn btn-order" onclick="addToCart('Pepperoni Pizza - ₹450')">Add to Cart</button>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card position-relative">
          <span class="discount">15% OFF</span>
          <img src="veggiepizza.png" class="card-img-top" alt="Veggie Delight Pizza">
          <div class="card-body text-center">
            <h5 class="card-title">Veggie Delight</h5>
            <p class="card-text">Loaded with fresh veggies<br>Price: ₹400</p>
            <button class="btn btn-order" onclick="addToCart('Veggie Delight Pizza - ₹400')">Add to Cart</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  
  <div class="container mt-5">
    <h3 class="text-center"> Your Cart</h3>
    <ul id="cart" class="list-group"></ul>
    <div class="text-center mt-3">
      <button id="checkoutBtn" class="btn btn-success">Checkout</button>
    </div>
  </div>


  <footer>
    <p>&copy; 2026 La Pasta Bella • Crafted with Love</p>
  </footer>

 
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const cart = [];
    const cartList = document.getElementById("cart");

    function addToCart(item) {
      cart.push(item);
      const li = document.createElement("li");
      li.className = "list-group-item";
      li.textContent = item;
      cartList.appendChild(li);
    }

    document.getElementById("checkoutBtn").addEventListener("click", () => {
      if(cart.length === 0) {
        alert("Your cart is empty!");
      } else {
        alert("Order placed successfully! 🎉\nItems: " + cart.join(", "));
      }
    });
  </script>
</body>
</html>
