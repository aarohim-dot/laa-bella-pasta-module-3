<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Menu - La Pasta Bella</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Cinzel', serif;
      background: #fff8f0;
      color: #333;
    }
    header h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 3.5em;
      color: #8B0000;
      margin-top: 20px;
    }
    marquee {
      font-size: 1.2em;
      font-style: italic;
      background: #f0d9c2;
      padding: 8px;
      border-radius: 8px;
      width: 70%;
      margin: auto;
    }
    .card {
      border: none;
      transition: transform 0.3s ease;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    .btn-order {
      background: #8B0000;
      color: #fff;
    }
    .btn-order:hover {
      background: #a52a2a;
    }
    footer {
      background-color: #8B0000;
      color: white;
      padding: 15px;
      text-align: center;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="text-center">
    <h1>Our Menu</h1>
    <marquee>Authentic Taste • Elegant Ambience • Italian Spirit</marquee>
    <hr>
  </header>

  <!-- Menu Grid -->
  <div class="container mt-4">
    <div class="row g-4">
      <!-- Wine -->
      <div class="col-md-4">
        <div class="card">
          <img src="https://www.foodandwine.com/wine/sweet-wine-dessert-myths" class="card-img-top" alt="Wine">
          <div class="card-body text-center">
            <h5 class="card-title">Wine</h5>
            <p class="card-text">Finest Italian wines</p>
            <button class="btn btn-order" onclick="location.href='wine.html'">Explore</button>
          </div>
        </div>
      </div>
      <!-- Pasta -->
      <div class="col-md-4">
        <div class="card">
          <img src="pasta.png" class="card-img-top" alt="Pasta">
          <div class="card-body text-center">
            <h5 class="card-title">Pasta</h5>
            <p class="card-text">Handmade with love</p>
            <button class="btn btn-order" onclick="location.href='pasta.html'">Explore</button>
          </div>
        </div>
      </div>
      <!-- Burrito -->
      <div class="col-md-4">
        <div class="card">
          <img src="buritto.png" class="card-img-top" alt="Burrito">
          <div class="card-body text-center">
            <h5 class="card-title">Burrito</h5>
            <p class="card-text">Fusion flavors</p>
            <button class="btn btn-order" onclick="location.href='burritto.html'">Explore</button>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-4 mt-3">
      <!-- Pizza -->
      <div class="col-md-6">
        <div class="card">
          <img src="pizza.png" class="card-img-top" alt="Pizza">
          <div class="card-body text-center">
            <h5 class="card-title">Pizza</h5>
            <p class="card-text">Wood-fired perfection</p>
            <button class="btn btn-order" onclick="location.href='pizza.html'">Explore</button>
          </div>
        </div>
      </div>
      <!-- Soft Drink -->
      <div class="col-md-6">
        <div class="card">
          <img src="softdrink.png" class="card-img-top" alt="Soft Drink">
          <div class="card-body text-center">
            <h5 class="card-title">Soft Drink</h5>
            <p class="card-text">Refreshing and cool</p>
            <button class="btn btn-order" onclick="location.href='softdrink.html'">Explore</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Reservation Section -->
  <div class="container mt-5">
    <h3 class="text-center">Reservation</h3>
    <div class="text-center mt-3">
      <button id="reservationBtn" class="btn btn-primary">Reserve Your Seat</button>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 La Pasta Bella • Crafted with Love</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script>
    // Reservation button logic
    document.getElementById("reservationBtn").addEventListener("click", () => {
      window.location.href = "reservation.html";
    });
  </script>
</body>
</html>
