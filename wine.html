<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wine Menu - La Pasta Bella</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Cinzel', serif;
      background: #fff8f0;
    }
    header {
      text-align: center;
      padding: 20px;
    }
    header h1 {
      color: #8B0000;
      font-size: 3em;
    }
    .card {
      transition: transform 0.3s ease;
    }
    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    .btn-order {
      background: #8B0000;
      color: #fff;
    }
    .btn-order:hover {
      background: #a52a2a;
    }
    .discount {
      position: absolute;
      top: 10px;
      right: 10px;
      background: gold;
      color: black;
      padding: 5px 10px;
      border-radius: 5px;
      font-weight: bold;
    }
    footer {
      background: #8B0000;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <h1>Wine Selection</h1>
    <p>Choose from our finest Italian wines</p>
    <hr>
  </header>

  <!-- Wine Cards -->
  <div class="container mt-4">
    <div class="row g-4">
      <!-- Red Wine -->
      <div class="col-md-4">
        <div class="card position-relative">
          <span class="discount">10% OFF</span>
          <img src="redwine.png" class="card-img-top" alt="Red Wine">
          <div class="card-body text-center">
            <h5 class="card-title">Red Wine</h5>
            <p class="card-text">Rich and bold flavour<br>Price: ₹1200</p>
            <button class="btn btn-order" onclick="addToCart('Red Wine - ₹1200')">Add to Cart</button>
          </div>
        </div>
      </div>
      <!-- White Wine -->
      <div class="col-md-4">
        <div class="card position-relative">
          <img src="whitewine.png" class="card-img-top" alt="White Wine">
          <div class="card-body text-center">
            <h5 class="card-title">White Wine</h5>
            <p class="card-text">Smooth and refreshing<br>Price: ₹900</p>
            <button class="btn btn-order" onclick="addToCart('White Wine - ₹900')">Add to Cart</button>
          </div>
        </div>
      </div>
      <!-- Rose Wine -->
      <div class="col-md-4">
        <div class="card position-relative">
          <span class="discount">Special ₹750</span>
          <img src="rosewine.png" class="card-img-top" alt="Rose Wine">
          <div class="card-body text-center">
            <h5 class="card-title">Rose Wine</h5>
            <p class="card-text">Delicate and fruity<br>Price: ₹800</p>
            <button class="btn btn-order" onclick="addToCart('Rose Wine - ₹800')">Add to Cart</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Cart Section -->
  <div class="container mt-5">
    <h3 class="text-center">🛒 Your Cart</h3>
    <ul id="cart" class="list-group"></ul>
    <div class="text-center mt-3">
      <button id="checkoutBtn" class="btn btn-success">Checkout</button>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 La Pasta Bella • Crafted with Love</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script>
    const cart = [];
    const cartList = document.getElementById("cart");

    function addToCart(item) {
      cart.push(item);
      const li = document.createElement("li");
      li.className = "list-group-item";
      li.textContent = item;
      cartList.appendChild(li);
    }

    document.getElementById("checkoutBtn").addEventListener("click", () => {
      if(cart.length === 0) {
        alert("Your cart is empty!");
      } else {
        alert("Order placed successfully! 🎉\nItems: " + cart.join(", "));
      }
    });
  </script>
</body>
</html>
