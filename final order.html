<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Confirmation - La Pasta Bella</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Cinzel', serif;
      background: #fff8f0;
      color: #333;
    }
    header {
      text-align: center;
      padding: 40px 20px;
    }
    header h1 {
      color: #8B0000;
      font-size: 3em;
    }
    .card {
      margin: 20px auto;
      max-width: 600px;
      border: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    .btn-home {
      background: #8B0000;
      color: #fff;
    }
    .btn-home:hover {
      background: #a52a2a;
    }
    footer {
      background: #8B0000;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <h1>Order Confirmation</h1>
    <p>Thank you for ordering with La Pasta Bella!</p>
    <hr>
  </header>

  <!-- Confirmation Card -->
  <div class="card">
    <div class="card-body text-center">
      <h4 class="card-title">🎉 Your Order Has Been Placed!</h4>
      <p class="card-text">We’ve received your order and our chefs are preparing it with love.</p>
      <p class="card-text"><strong>Order Summary:</strong></p>
      <ul id="orderSummary" class="list-group mb-3"></ul>
      <h5>Total: <span id="orderTotal">₹0</span></h5>
      <button class="btn btn-home" onclick="window.location.href='index.html'">Back to Home</button>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 La Pasta Bella • Crafted with Love</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script>
    // Example: In a real flow, items would be passed here from checkout
    const orderItems = JSON.parse(localStorage.getItem("cart")) || [];
    const orderSummary = document.getElementById("orderSummary");
    const orderTotal = document.getElementById("orderTotal");

    let total = 0;
    orderItems.forEach(item => {
      const li = document.createElement("li");
      li.className = "list-group-item";
      li.textContent = item.name + " - ₹" + item.price;
      orderSummary.appendChild(li);
      total += item.price;
    });

    orderTotal.textContent = "₹" + total;
  </script>
</body>
</html>
